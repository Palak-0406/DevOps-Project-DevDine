apiVersion: apps/v1
kind: Deployment
metadata:
  name: devdine-deployment
  labels:
    app: devdine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devdine
  template:
    metadata:
      labels:
        app: devdine
    spec:
      containers:
      - name: devdine-container
        image: devdine:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80